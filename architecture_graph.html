<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ghostfolio Architecture Graph</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; background-color: #0d1117; color: #c9d1d9; overflow: hidden; }
        #controls { position: absolute; top: 20px; left: 20px; background: rgba(22, 27, 34, 0.8); padding: 15px; border-radius: 8px; border: 1px solid #30363d; backdrop-filter: blur(10px); }
        h1 { margin: 0 0 10px 0; font-size: 1.2rem; color: #58a6ff; }
        .node circle { stroke: #0d1117; stroke-width: 1.5px; }
        .node text { font-size: 10px; fill: #c9d1d9; pointer-events: none; opacity: 0; transition: opacity 0.2s; }
        .node:hover text { opacity: 1; }
        .link { stroke: #30363d; stroke-opacity: 0.6; }
        .legend-item { display: flex; align-items: center; margin-bottom: 5px; font-size: 12px; }
        .legend-color { width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; }
    </style>
</head>
<body>
    <div id="controls">
        <h1>Architecture Graph</h1>
        <div id="legend"></div>
        <p style="font-size: 12px; color: #8b949e; margin-top: 10px;">Hover over nodes to see labels.<br>Drag nodes to pin them.</p>
    </div>
    <svg id="graph"></svg>

    <script>
        const colorMap = {
            'file': '#8b949e',
            'route': '#3fb950',
            'service': '#a371f7',
            'middleware': '#d29922',
            'entity': '#f85149'
        };

        // Populate legend
        const legend = document.getElementById('legend');
        Object.entries(colorMap).forEach(([type, color]) => {
            const item = document.createElement('div');
            item.className = 'legend-item';
            item.innerHTML = `<div class="legend-color" style="background: ${color}"></div>${type.charAt(0).toUpperCase() + type.slice(1)}`;
            legend.appendChild(item);
        });

        // Load graph data
        fetch('benchmarks_real/ghostfolio/source/architecture_graph.json')
            .then(res => res.json())
            .then(data => renderGraph(data))
            .catch(err => console.error("Error loading graph:", err));

        function renderGraph(data) {
            const width = window.innerWidth;
            const height = window.innerHeight;

            const svg = d3.select("#graph")
                .attr("width", width)
                .attr("height", height)
                .call(d3.zoom().on("zoom", (event) => {
                    g.attr("transform", event.transform);
                }));

            const g = svg.append("g");

            const simulation = d3.forceSimulation(data.nodes)
                .force("link", d3.forceLink(data.edges).id(d => d.id).distance(50))
                .force("charge", d3.forceManyBody().strength(-30))
                .force("center", d3.forceCenter(width / 2, height / 2))
                .force("collide", d3.forceCollide().radius(10));

            const link = g.append("g")
                .attr("class", "links")
                .selectAll("line")
                .data(data.edges)
                .enter().append("line")
                .attr("class", "link");

            const node = g.append("g")
                .attr("class", "nodes")
                .selectAll("g")
                .data(data.nodes)
                .enter().append("g")
                .attr("class", "node")
                .call(d3.drag()
                    .on("start", dragstarted)
                    .on("drag", dragged)
                    .on("end", dragended));

            node.append("circle")
                .attr("r", d => d.type === 'file' ? 8 : 5)
                .attr("fill", d => colorMap[d.type] || '#fff');

            node.append("text")
                .attr("dx", 12)
                .attr("dy", ".35em")
                .text(d => d.label);

            node.append("title")
                .text(d => `${d.type}: ${d.label}`);

            simulation.on("tick", () => {
                link
                    .attr("x1", d => Math.max(10, Math.min(width - 10, d.source.x)))
                    .attr("y1", d => Math.max(10, Math.min(height - 10, d.source.y)))
                    .attr("x2", d => Math.max(10, Math.min(width - 10, d.target.x)))
                    .attr("y2", d => Math.max(10, Math.min(height - 10, d.target.y)));

                node
                    .attr("transform", d => {
                        d.x = Math.max(10, Math.min(width - 10, d.x));
                        d.y = Math.max(10, Math.min(height - 10, d.y));
                        return `translate(${d.x},${d.y})`;
                    });
            });

            function dragstarted(event, d) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                d.fx = d.x;
                d.fy = d.y;
            }

            function dragged(event, d) {
                d.fx = event.x;
                d.fy = event.y;
            }

            function dragended(event, d) {
                if (!event.active) simulation.alphaTarget(0);
                // Keep pinned
            }
        }

        window.addEventListener('resize', () => {
            d3.select("#graph")
                .attr("width", window.innerWidth)
                .attr("height", window.innerHeight);
        });
    </script>
</body>
</html>
